name: CICD
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      rustfs:
        image: rustfs/rustfs:latest
        ports:
          - 9000:9000
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14", "pypy3.11" ]
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Build
        run: |
          if [[ "${{ matrix.python-version }}" == "pypy"* ]]; then
            uv pip install ".[dev,numpy,s3fs]"
          else
            uv pip install ".[all]"
          fi
          uv run ruff check --statistics .
          uv run pytest --cov=msglc tests/
      - name: Upload
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          plugins: pycoverage
  linux:
    name: Wheels (linux)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[publish]')
    needs: test
    strategy:
      matrix:
        target: [ x86_64 ]
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Python
        uses: astral-sh/setup-uv@v5
      - name: Version
        run: sed -i -E 's/^version = "[0-9]{6}"$/version = "'"$(date +%y%m%d)"'"/' pyproject.toml
      - name: Build
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist
  windows:
    name: Wheels (windows)
    runs-on: windows-latest
    if: contains(github.event.head_commit.message, '[publish]')
    needs: test
    strategy:
      matrix:
        target: [ x64 ]
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Python
        uses: astral-sh/setup-uv@v5
      - name: Version
        shell: bash
        run: sed -i -E 's/^version = "[0-9]{6}"$/version = "'"$(date +%y%m%d)"'"/' pyproject.toml
      - name: Build
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist
  macos:
    name: Wheels (macos)
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, '[publish]')
    needs: test
    strategy:
      matrix:
        target: [ x86_64, aarch64 ]
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Python
        uses: astral-sh/setup-uv@v5
      - name: Version
        run: sed -i -E 's/^version = "[0-9]{6}"$/version = "'"$(date +%y%m%d)"'"/' pyproject.toml
      - name: Build
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[publish]')
    needs: test
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Version
        run: sed -i -E 's/^version = "[0-9]{6}"$/version = "'"$(date +%y%m%d)"'"/' pyproject.toml
      - name: Build
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ linux, windows, macos, sdist ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      id-token: write
    steps:
      - name: Collect
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
  documentation:
    name: Documentation
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Delete
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.ALL }}
          environment: github-pages
      - name: Clone
        uses: actions/checkout@v6
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Deploy
        run: |
          uv pip install -e .[all]
          uv run mkdocs build
          git fetch origin
          git config --global user.name "Theodore Chang"
          git config --global user.email "tlcfem@gmail.com"
          git pull
          uv run mkdocs gh-deploy
