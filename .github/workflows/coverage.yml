concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  benchmark:
    name: Benchmark
    runs-on: ${{ matrix.os }}
    services:
      rustfs:
        env:
          RUSTFS_ACCESS_KEY: msglcadmin
          RUSTFS_SECRET_KEY: msglcadmin
        image: rustfs/rustfs:latest
        ports:
          - '9000:9000'
      seaweedfs:
        env:
          AWS_ACCESS_KEY_ID: msglcadmin
          AWS_SECRET_ACCESS_KEY: msglcadmin
        image: chrislusf/seaweedfs
        ports:
          - '8333:8333'
    steps:
      - name: Clone
        uses: actions/checkout@v7
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build
        run: |
          uv venv
          uv pip install ".[all]"
          uv run pytest tests/
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        python-version:
          - '3.11'
          - '3.14'
    timeout-minutes: 30
  release:
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[publish]')
    name: Release
    needs:
      - wheels
      - sdist
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Collect
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
  sdist:
    if: github.ref == 'refs/heads/master'
    name: Build sdist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Version
        run: sed -i -E 's/^version = "[0-9]{6}"$/version = "'"$(date +%y%m%d)"'"/' pyproject.toml
      - name: Build
        uses: PyO3/maturin-action@v1
        with:
          args: '--out dist'
          command: sdist
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      rustfs:
        env:
          RUSTFS_ACCESS_KEY: msglcadmin
          RUSTFS_SECRET_KEY: msglcadmin
        image: rustfs/rustfs:latest
        ports:
          - '9000:9000'
      seaweedfs:
        env:
          AWS_ACCESS_KEY_ID: msglcadmin
          AWS_SECRET_ACCESS_KEY: msglcadmin
        image: chrislusf/seaweedfs
        ports:
          - '8333:8333'
    steps:
      - name: Clone
        uses: actions/checkout@v7
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools
      - name: Coverage
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build
        run: |
          uv venv
          source <(cargo llvm-cov show-env --sh)
          export CARGO_TARGET_DIR=$CARGO_LLVM_COV_TARGET_DIR
          uv pip install -e ".[all]" maturin
          uv run maturin develop --uv
          uv run ruff check --statistics .
          uv run pytest --cov=msglc --cov-report=xml tests/
          cargo llvm-cov report --lcov --output-path coverage.lcov
      - name: Upload
        uses: codecov/codecov-action@v7
        with:
          files: coverage.lcov,coverage.xml
          plugins: pycoverage,gcov
          token: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        python-version:
          - '3.11'
          - '3.14'
    timeout-minutes: 60
  wheels:
    if: github.ref == 'refs/heads/master'
    name: Wheels
    needs: test
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone
        uses: actions/checkout@v7
      - name: Python
        uses: astral-sh/setup-uv@v7
      - name: Version
        run: |
          import re
          from datetime import datetime

          with open("pyproject.toml") as f:
              content = f.read()
          with open("pyproject.toml", "w") as f:
              f.write(
                  re.sub(
                      r'^version = "[0-9]{6}"$',
                      f'version = "{datetime.now().strftime("%y%m%d")}"',
                      content,
                      flags=re.MULTILINE,
                  )
              )
        shell: python
      - name: Build
        uses: PyO3/maturin-action@v1
        with:
          args: '--release --out dist --find-interpreter'
          manylinux: auto
          sccache: 'true'
          target: ${{ matrix.target }}
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist
    strategy:
      matrix:
        exclude:
          - os: windows-latest
            target: aarch64
          - os: windows-11-arm
            target: x86_64
        os:
          - ubuntu-latest
          - windows-latest
          - windows-11-arm
          - macos-latest
        target:
          - x86_64
          - aarch64
name: CICD
'on':
  pull_request: null
  push: null
permissions:
  contents: write
