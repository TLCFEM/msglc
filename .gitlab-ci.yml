stages:
  - test
test:
  stage: test
  image: rust:latest
  parallel:
    matrix:
      - PYTHON_VERSION: "3.10"
      - PYTHON_VERSION: "3.11"
      - PYTHON_VERSION: "3.12"
      - PYTHON_VERSION: "3.13"
      - PYTHON_VERSION: "3.14"
  services:
    - name: rustfs/rustfs:latest
      alias: rustfs
      variables:
        RUSTFS_ACCESS_KEY: msglcadmin
        RUSTFS_SECRET_KEY: msglcadmin
    - name: chrislusf/seaweedfs
      alias: seaweedfs
      variables:
        AWS_ACCESS_KEY_ID: msglcadmin
        AWS_SECRET_ACCESS_KEY: msglcadmin
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.cargo/bin:$HOME/.local/bin:$PATH"
    - uv python install $PYTHON_VERSION
    - uv venv
    - uv pip install -e ".[all]"
  script:
    - uv run maturin develop --uv
    - uv run ruff check .
    - uv run pytest